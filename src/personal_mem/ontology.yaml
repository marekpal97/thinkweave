# personal_mem concept ontology
#
# Domain → [concepts]. Concepts are the typed-edge vocabulary that links
# notes in the knowledge graph; any two notes sharing 2+ concepts auto-link.
#
# This file ships as a minimal seed. It is meant to grow as you use the
# vault — every time you run /mem-resolve-concepts, proposed concepts from
# recent notes get canonicalized and (with your approval) folded in here.
#
# For a fuller reference of how the ontology looks after months of use see
# `ontology.example.yaml` in the same directory.
#
# Rules of thumb:
#   - Concepts must be kebab-case, lowercase.
#   - A concept can appear in multiple domains (cross-listing is fine).
#   - Domains become Obsidian hub pages via `mem concepts hubs`.
#   - Concepts are INVARIANT — durable patterns, structures, regimes.
#     Named events ("2024-election", "iran-war-2026") belong in theme notes,
#     not in the ontology. They cite invariant concepts; they don't extend
#     the ontology.
#   - Only concepts with vault-wide count >= 5 are worth listing here;
#     anything rarer should live as `proposed_concepts` frontmatter until it
#     earns its place.


# Tag vocabulary — the canonical set of tags. Tags are broad categories on
# notes (state, source class, kind of work). Distinct from concepts, which
# are domain-specific vocabulary forming the typed-edge graph. A term lives
# in one or the other — never both. The linter (`mem doctor`) treats this
# list as canonical and reports tags outside it as drift. Categories live
# in comments alongside each entry.

tag_vocabulary:
  # Workflow / state
  - todo                  # workflow: open work item
  - parked                # workflow: deliberately deferred (body explains why)
  - probe                 # workflow: user question + discovery — learning artifact
  - theme                 # workflow: narrative aggregator (e.g. trade themes)
  - trade                 # workflow: trading position decision
  - til                   # workflow: today-i-learned
  - pinned                # workflow: explicitly kept-visible
  - autopilot             # workflow: agent-run / automated
  - mem-wrap              # workflow: produced by /mem-wrap
  - discover              # workflow: produced by /discover
  - audit                 # workflow: audit / hygiene activity
  - hubs                  # workflow: hub-related session
  - concept-hygiene       # workflow: concept dedup / cleanup
  - backlog-hygiene       # workflow: backlog grooming
  - session-lifecycle     # workflow: session-mechanics topic

  # Source class
  - research              # source: research backlog item
  - research-paper        # source: ingested arxiv / academic paper
  - survey                # source: survey paper
  - reference             # source: reference doc / spec
  - tutorial              # source: tutorial / how-to
  - course                # source: course material
  - awesome-list          # source: curated-index repo
  - substack              # source: substack newsletter

  # Meta — kind of work
  - refactor              # meta: structural code change
  - debugging             # meta: investigation / fix
  - performance           # meta: speed / resource concern
  - security              # meta: security concern
  - enhancement           # meta: extension to existing feature
  - bug                   # meta: defect / fix
  - design                # meta: design choice / system design
  - paradigm              # meta: paradigmatic shift / extension
  - anti-pattern          # meta: noted anti-pattern
  - design-pattern        # meta: noted design pattern
  - finding               # meta: observed result
  - negative-result       # meta: thing that didn't work
  - reliability           # meta: reliability / robustness concern
  - process               # meta: process / methodology
  - benchmark             # meta: benchmark / performance comparison
  - methodology           # meta: methodology note

  # Investment workflow
  - investment-research   # workflow: investment research item
  - trade-idea            # workflow: trade idea capture
  - research-direction    # workflow: where research is heading

  # Domain
  - finance               # domain
  - ai                    # domain
  - ml                    # domain
  - swe                   # domain
  - fitness               # domain
  - economics             # domain

  # Misc / capability
  - open-source           # property: open-source artifact
  - planning              # workflow: planning artifact
  - nlp                   # domain: natural language processing
  - infrastructure        # domain: infra / platform


# Domain-marker substrings — `prune_noisy_singletons` keeps any canonical
# concept whose name contains one of these, even when count==1 and the
# concept isn't in the ontology. The built-in set in `synthesis/concepts.py`
# (math, ML, finance, fitness, physics, common tools) ships as defaults; add
# your own domain substrings here in your *vault* override at
# `<vault>/.mem/ontology.yaml::domain_markers` (this file is the package
# seed — edit the vault override, not this). The vault list extends, never
# replaces, the built-ins. Substring match, case-insensitive, lowercase
# only.
#
# Example for a chemistry/music vault:
#   domain_markers:
#     - polymer
#     - catalyst
#     - chord
#     - cadence
domain_markers: []


