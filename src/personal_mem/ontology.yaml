# personal_mem concept ontology
#
# Domain → [concepts]. Concepts are the typed-edge vocabulary that links
# notes in the knowledge graph; any two notes sharing 2+ concepts auto-link.
#
# This file ships as a minimal seed. It is meant to grow as you use the
# vault — every time you run /mem-resolve-concepts, proposed concepts from
# recent notes get canonicalized and (with your approval) folded in here.
# Over months of use it becomes a faithful map of your actual vocabulary.
#
# For a fuller reference showing how the ontology looks after real-world
# use across ML, AI tooling, finance, and software engineering domains,
# see `ontology.example.yaml` in the same directory.
#
# Rules of thumb:
#   - Concepts must be kebab-case, lowercase.
#   - A concept can appear in multiple domains (cross-listing is fine).
#   - Domains become Obsidian hub pages via `mem concepts hubs`.
#   - Only concepts with vault-wide count >= 5 are worth listing; anything
#     rarer should live as a `proposed_concepts` frontmatter field until it
#     earns its place here.

swe/python:
  - python
  - pytest
  - typing
  - pathlib

ai/llms:
  - llm
  - prompt-engineering
  - tool-use
  - context-window

ai/tools:
  - claude-code
  - mcp-server
  - obsidian
