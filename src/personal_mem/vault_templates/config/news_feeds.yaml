# personal_mem news-feed registry
#
# Outlets are keyed by short slug. The slug becomes the author folder for
# news notes (`vault/sources/news/<slug>/...`). Edit freely — `mem init`
# only seeds this file once; from then on it's yours.
#
# Per-outlet fields:
#   name             — display name (becomes `author` frontmatter on each note)
#   feeds            — inline list of RSS / Atom URLs (single-string ok too)
#   tier             — 1 (trusted: 1 concept-match passes FOCUS) or 2 (needs 2)
#   region           — global / poland / europe / us / asia (free-form)
#   language         — en / pl / ... (Polish triggers in-worker translation)
#   prefer_embedded  — true if RSS provides full content via content:encoded
#   daily_cap        — max items per outlet per UTC day
#
# Verify URLs on first install: `uv run python scripts/pull_news_feeds.py`.
# Dead URLs print a warning and skip; nothing breaks.

outlets:
  # ─── Macro / global markets ───────────────────────────────────────────
  zerohedge:
    name: ZeroHedge
    feeds: [https://feeds.feedburner.com/zerohedge/feed]
    tier: 2
    region: global
    prefer_embedded: true
    daily_cap: 10

  cnbc:
    name: CNBC Markets
    feeds: [https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=15839069]
    # Demoted to tier 2 — half the items are non-watchlist analyst calls
    # / single-name earnings previews; tier-2's 2-concept admission rule
    # keeps the substantive macro/AI items, drops the noise.
    tier: 2
    region: global
    prefer_embedded: false
    daily_cap: 8

  calculated-risk:
