# personal_mem podcast-events feed registry
#
# Event-grain podcasts — markets / macro / interview shows where each
# episode is a discrete signal worth surfacing as a theme candidate.
# Concept-grain shows (deep-dives, lectures, technical explainers) go
# in podcast_concepts_feeds.yaml instead.
#
# Outlets are keyed by short slug. The slug becomes the author folder
# for podcast notes (`vault/sources/podcast-events/<slug>/...`). Edit
# freely — `mem init` only seeds this file once; from then on it's yours.
#
# Per-outlet fields:
#   name             — display name (becomes `author` frontmatter on each note)
#   feeds            — inline list of RSS feed URLs (single-string ok too)
#   tier             — 1 (trusted) or 2 (secondary)
#   language         — en / pl / ...
#   daily_cap        — max episodes per show per UTC day (default 5)
#
# Finding the RSS URL: most podcast hosts expose it on the show page.
# Apple Podcasts hides it; use a directory like Castro / Overcast / Podchaser,
# or query the iTunes API:
#   curl -s 'https://itunes.apple.com/lookup?id=<APPLE_ID>' | jq -r '.results[0].feedUrl'
#
# Verify URLs on first install: `uv run mem discover --strategy rss_poll --source-type podcast-events`.
# Dead URLs print a warning and skip; nothing breaks.

outlets:
  # ─── Examples (commented out — uncomment + verify URL to subscribe) ────
  #
  # macro-trading-floor:
  #   name: The Macro Trading Floor
  #   # Hosts: Alfonso Peccatiello (Macro Compass) + Brent Donnelly (Spectra Markets).
  #   # Hosted on Spreaker — verify current RSS URL on the show page.
  #   feeds: [https://www.spreaker.com/show/<SHOW_ID>/episodes/feed]
  #   tier: 1
  #   language: en
  #   daily_cap: 2
  #
  # forward-guidance:
  #   name: Forward Guidance
  #   feeds: [<verify-via-castro-or-itunes-lookup>]
  #   tier: 1
  #   language: en
  #   daily_cap: 2
  #
  # odd-lots:
  #   name: Odd Lots
  #   feeds: [https://feeds.bloomberg.fm/BLM3954264911]
  #   tier: 1
  #   language: en
  #   daily_cap: 3
