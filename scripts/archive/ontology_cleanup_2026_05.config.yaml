# Ontology cleanup config — slate decisions crystallised as data.
# Consumed by scripts/ontology_cleanup_2026_05.py.
#
# Operations apply to vault notes' frontmatter (tags + concepts arrays).
# ontology.yaml itself is edited separately (manual, see commit).
# Concept-side renames are done via `mem concepts merge` (separate step).

# ============================================================
# 1. Strip these strings from any note's `tags:` array.
# ============================================================
tag_deletes:
  # Section A — concept-wins overlaps (delete tag side, concept stays):
  - novelty-detection
  - documentation
  - implementation
  - options
  - feature-extraction
  - image-handling
  - continual-learning
  - deployment
  - market-research
  - contrastive-learning
  - idempotency
  - resilience

  # Section E — DELETE-FROM-NOTES (lifecycle / noise, not vocabulary):
  - budget-constraint
  - coordinator-discipline
  - cosmetic
  - cron
  - data-fix
  - data-quality
  - dedup
  - design-choice
  - developer-experience
  - failure
  - failure-mode
  - feedback
  - insight
  - lesson
  - lesson-learned
  - meta
  - plan-revision
  - pivot
  - pragmatic
  - scope-control
  - skipped
  - source-types

  # Section E — DELETE (too-generic / out-of-scope domains):
  - engineering
  - framework
  - philosophy
  - policy
  - processing
  - scanner
  - scheduling
  - theory
  - thesis
  - mobile
  - biotech
  - cognitive-science
  - medical-imaging
  - tool

# ============================================================
# 2. Rename within `tags:` array (left → right).
# ============================================================
tag_renames:
  benchmarking: benchmark
  new-feature: enhancement
  paradigm-shift: paradigm
  paradigm-extension: paradigm
  paradigm-decision: paradigm
  reference-list: reference

# ============================================================
# 3. Move from `tags:` to `concepts:`.
# Strip the tag, then add the concept if not already present.
# Only includes mappings where the target concept is genuinely useful;
# vague singletons go to tag_deletes instead.
# ============================================================
tag_to_concept:
  agents: agentic-systems
  continual-learning: continual-learning
  contrastive-learning: contrastive-learning
  deployment: deployment
  feature-extraction: feature-extraction
  idempotency: idempotency
  inductive-bias: inductive-bias
  labor: labor-market
  labor-market: labor-market
  macro: macro-trading
  multi-agent: multi-agent-systems
  novelty-detection: novelty-detection
  resilience: resilience
  rl: reinforcement-learning
  ood-detection: out-of-distribution-detection
  density-novelty: density-estimation
  memory: memory-system
  memory-systems: memory-system
  agent-architecture: agentic-systems
  agent-framework: agentic-systems
  llm-agents: agentic-systems
  multi-agent-systems: multi-agent-systems

  # Aggressively pruned: these singleton tags are too vague to promote.
  # Listed here for record but commented out — script ignores them.
  # baseline, architecture-search, deep-learning, feature-design,
  # financial-nlp, high-dimensional, hub-system, implementation,
  # inference, information-retrieval, knowledge-base, ledger-pattern,
  # local-inference, local-llm, medical-imaging, real-time, reasoning,
  # recommendation, research-automation, streaming-ml, synthesis-layer,
  # system-design, theory, thesis, verification, indexer

# ============================================================
# 4. Strip these strings from any note's `concepts:` array.
# Section A "keep tag, delete vague concept" cases.
# ============================================================
concept_deletes:
  - framework      # Section A: too generic; redirect to specific framework names
  - infrastructure # Section A: too vague; specific infra concepts (docker, pipeline) survive
  - design         # Section A: keep tag, delete generic concept
  - planning       # Section A: workflow-shaped, not domain
  - mem-wrap       # Section A: workflow marker, not graph vocabulary

  # Tag singletons that were also accidental concepts (drop both sides):
  - architecture-search
  - baseline
  - deep-learning      # too vague; specific DL concepts survive
  - feature-design     # use feature-engineering
  - financial-nlp
  - high-dimensional
  - hub-system
  - implementation     # Section A: keep concept-dominant but flag for /mem-resolve-concepts
  - inference          # too generic
  - information-retrieval  # use hybrid-retrieval
  - knowledge-base     # use knowledge-graph
  - ledger-pattern
  - local-inference
  - local-llm
  - real-time
  - reasoning
  - recommendation
  - research-automation
  - streaming-ml
  - synthesis-layer
  - system-design
  - theory
  - thesis
  - verification
  - indexer
